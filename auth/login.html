<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - StudyHub</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f0f4f8;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .card {
            background: #fff;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 420px;
        }
        h2 { text-align: center; margin-bottom: 24px; color: #1a1a2e; font-size: 24px; }
        .form-group { margin-bottom: 16px; }
        label { display: block; margin-bottom: 6px; font-size: 14px; color: #555; font-weight: 500; }
        input {
            width: 100%; padding: 10px 14px; border: 1px solid #ddd;
            border-radius: 8px; font-size: 14px; outline: none; transition: border 0.2s;
        }
        input:focus { border-color: #4A90D9; }
        button {
            width: 100%; padding: 12px; background: #4A90D9; color: #fff;
            border: none; border-radius: 8px; font-size: 15px; cursor: pointer;
            margin-top: 8px; transition: background 0.2s;
        }
        button:hover { background: #357ABD; }
        .msg {
            padding: 10px 14px; border-radius: 8px;
            font-size: 13px; margin-bottom: 16px; display: none;
        }
        .msg.error   { background: #ffe0e0; color: #c0392b; }
        .msg.success { background: #e0f7e9; color: #27ae60; }
        .bottom-link { text-align: center; margin-top: 16px; font-size: 13px; color: #777; }
        .bottom-link a { color: #4A90D9; text-decoration: none; font-weight: 500; }
    </style>
</head>
<body>
<div class="card">
    <h2>📚 StudyHub</h2>

    <!-- Message box — shown by JS based on URL param -->
    <div id="msg" class="msg"></div>

    <form method="POST" action="login.php">
        <div class="form-group">
            <label>Email</label>
            <input type="email" name="email" placeholder="you@email.com" required>
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" name="password" placeholder="Your password" required>
        </div>
        <button type="submit">Login</button>
    </form>

    <div class="bottom-link">
        No account yet? <a href="register.php">Register here</a>
    </div>
</div>

<script>
    const params = new URLSearchParams(window.location.search);
    const msgBox = document.getElementById('msg');

    if (params.get('error')) {
        msgBox.textContent = '❌ Invalid email or password. Try again.';
        msgBox.classList.add('error');
        msgBox.style.display = 'block';
    }

    if (params.get('registered')) {
        msgBox.textContent = '✅ Account created! Please login.';
        msgBox.classList.add('success');
        msgBox.style.display = 'block';
    }
</script>
</body>
</html>
